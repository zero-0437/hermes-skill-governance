chain_name: debugger-chain
chain_keywords: [调试管线, bug诊断, debug-chain, 排错, diagnosing-bugs, 诊断bug, diagnosing bugs]
description: "Bug 诊断管线 — 反馈环→复现→假设→仪表→修复→清理"
owner: error-analyst
steps:
  - agent: error-analyst
    goal: "Phase 1: Build a feedback loop — 建立可运行的复现测试或验证方法"
    keywords: [feedback-loop, reproduce, failing-test]
    type: interactive
  - agent: programmer
    goal: "Phase 2: Reproduce + minimise — 最小化复现用例，排除无关因素"
    keywords: [minimise, isolate, reduce]
  - agent: error-analyst
    goal: "Phase 3: Hypothesise — 提出3-5个可证伪的根因假设"
    keywords: [hypothesise, root-cause, diagnosis]
    type: interactive
  - agent: programmer
    goal: "Phase 4: Instrument — 注入 [DEBUG-xxx] 标记日志，定位根因"
    keywords: [instrument, debug-log, trace]
  - agent: programmer
    goal: "Phase 5: Fix + regression test — 修复并验证回归测试"
    keywords: [fix, regression, verify]
  - agent: programmer
    goal: "Phase 6: Cleanup + post-mortem — 清除DEBUG日志，记录后验"
    keywords: [cleanup, postmortem, remove-logs]
chain_step_skills:
  error-analyst@0: [systematic-debugging]
  error-analyst@1: []
  error-analyst@2: [systematic-debugging]
  error-analyst@3: []
  error-analyst@4: [test-driven-development]
  error-analyst@5: []
