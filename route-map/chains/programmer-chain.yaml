chain_name: programmer-chain
chain_keywords: [编码管线, p-chain, parallel-review, 双轴审查, 开发管线]
description: "编码管线 — TDD实现→双评审→验证门控→收尾"
owner: programmer
steps:
  - agent: programmer
    goal: TDD 实现 + self-review
    keywords: [tdd, implement, build]
    completion_contract:
      - type: test
        description: "所有测试通过"
        verify_command: "uv run pytest -x"
  - agent: dual-review
    goal: 三轴双评审（spec 合规 + 代码质量 + 架构）
    keywords: [dual-review, 双评审]
    completion_contract:
      - type: script
        description: "双评审完成"
        verify_command: "test -f review_report.md || test -f quality_report.md || test -f architecture_report.md"
  - agent: reality-checker
    goal: verification-before-completion — 运行测试+curl验证+断言检查
    keywords: [verification, validate, test, 验证门控]
    type: interactive
    completion_contract:
      - type: test
        description: "所有测试通过"
        verify_command: "uv run pytest -x && uv run python -m doctest"
      - type: curl
        description: "服务健康检查"
        verify_command: "curl -sf http://localhost:8080/health"
  - agent: programmer
    goal: finishing-a-development-branch — commit→PR→收尾
    keywords: [finish, deliver, pr, 分支收尾]
    completion_contract:
      - type: script
        description: "工作区已清理，仅含预期变更"
        verify_command: "git status --porcelain | head -5"
chain_step_skills:
  programmer@0: [test-driven-development]
  programmer@1: [code-review, codebase-inspection, receiving-code-review]
  programmer@2: [verification, testing]
  programmer@3: [finishing-a-development-branch]
