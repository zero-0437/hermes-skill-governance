# chain_name: follow-process-chain
# NOTE: 此 chain 未在 index.yaml 中显式注册 chain_ref，通过 chains/ 目录扫描发现。
# 任何 agent 需要此流程时可在 index.yaml 的 chain_ref 中引用。
chain_name: follow-process-chain
chain_keywords: [按流程走, 标准流程, standard-flow, 全流程管线]
description: "标准流程管线 — PM拆解→Programmer实现→双评审(含修复循环)"
owner: pm-agent
steps:
  - agent: pm-agent
    goal: 任务拆解 — 将交付任务拆解为可执行的垂直切片
    keywords: [decompose, break-down, task-split, slice]
    completion_contract:
      - type: script
        description: "任务切片文件存在"
        verify_command: "test -f task-slice.md"
  - agent: pm-agent
    goal: 输出修复方案摘要（改动量+文件+风险），等待用户确认
    keywords: [fix-summary, confirm, review-plan]
    interactive: true
  - agent: programmer
    goal: 按拆解结果逐个实现代码
    keywords: [implement, build, execute, code]
    batch: true
  - agent: dual-review
    goal: 三轴双评审（spec 合规 + 代码质量 + 架构）
    keywords: [dual-review, 双评审]
    completion_contract:
      - type: script
        description: "双评审完成"
        verify_command: "test -f review_report.md || test -f quality_report.md || test -f architecture_report.md"
chain_step_skills:
  pm-agent@0: [writing-plans]
  pm-agent@1: [writing-plans]
  pm-agent@2: [test-driven-development]
  pm-agent@3: [code-review, receiving-code-review, architecture-review, codebase-inspection]
