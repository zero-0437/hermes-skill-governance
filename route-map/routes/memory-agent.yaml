# route-map/routes/memory-agent.yaml
# 跨任务持久化记忆库 — 只追加不修改
agent: memory-agent
priority: 9
condition: "记忆管理/知识库/Obsidian 笔记"
rules:
  # ── 记忆/知识管理 ──────────────────────────────────────
  - type: phrase
    pattern: "记忆"
    weight: 0.9
    fuzzy: true
    skills: []
  - type: phrase
    pattern: "知识库"
    weight: 0.9
    fuzzy: true
    skills: []
  - type: phrase
    pattern: "知识管理"
    weight: 0.8
    fuzzy: true
    skills: []
  - type: phrase
    pattern: "历史会话"
    weight: 0.8
    fuzzy: true
    skills: []

  # ── 笔记/Obsidian ─────────────────────────────────────
  - type: phrase
    pattern: "笔记"
    weight: 0.7
    fuzzy: true
    skills: []
  - type: regex
    pattern: "\\b(Obsidian|llm.*wiki|wiki.*query)\\b"
    weight: 0.9
    skills: []

  # ── 回顾/记忆操作 ─────────────────────────────────────
  - type: phrase
    pattern: "之前说过"
    weight: 0.8
    fuzzy: true
    skills: []
  - type: phrase
    pattern: "记住"
    weight: 0.7
    fuzzy: true
    skills: []
  - type: phrase
    pattern: "忘记"
    weight: 0.7
    fuzzy: true
    skills: []

  # ── 主动记忆操作（2026-07-02 新增） ────────────────────────────
  - type: phrase
    pattern: 记录
    weight: 0.7
    skills: []
    fuzzy: true
  - type: phrase
    pattern: 保存
    weight: 0.5
    skills: []
    fuzzy: true
  - type: phrase
    pattern: 回顾
    weight: 0.7
    skills: []
    fuzzy: true
  - type: phrase
    pattern: 总结
    weight: 0.7
    skills: []
    fuzzy: true
